id: 372
formes: 1
name: 巨鼓象
tier: OU

overview: |
  功能测试中, 内容为AI胡编乱造, 巨鼓象是当前环境中最顶级的物理盾牌之一，173点物防,133点血配合特性「合拍」
  让它能压制大量物理输出手。133/85的HP和特防端也不算脆，但特耐短板
  还是明显。物攻125点搭配不错的补盲技能，让它不是纯粹的被动盾牌，
  而是有很强压迫感的中等速度坦克。

sets:
  - name: 物理盾向发育
    type: 防御
    moves:
      - {name: 轴承支撑, type: 机械, category: 变化, desc: 本系稳定输出，配合高物防压制物攻手}
      - {name: 休息回复, type: 普通, category: 变化, desc: 回复手段+解状态，大幅提升续航}
      - {name: 减压阀, type: 机械, category: 变化, desc: 补盲技能，打击机械系不抵抗的目标}
      - {name: 齿轮扭矩, type: 机械, category: 物理, desc: 强化物防或特防，视对局需要选择}
    item: 
    ability: 合拍
    nature: 平和(+生命 -魔攻)
    evs: {hp: 10, attack: 10, defense: 10}
    bloodline: 普通
    setDetails: |
      最大化物理耐久，放弃魔防端. 配合「合拍」特性可以在猜中对手技能系别/类型/能耗后
      获得物攻物防+20%的恐怖加成。轴承支撑提供稳定续航, 配合休息回复能使得物防端的续航越来越强，
      减压阀传动1与轴承支撑传动1之间夹着齿轮扭矩, 保证了齿轮扭矩每回合都能叠加伤害, 这使得巨鼓象的输出能力会越来越有压迫感。
      需要注意特攻手的突破，尤其是火系和水系特攻手。

  - name: 物理向快速发育
    type: 攻击
    moves:
      - {name: 轴承支撑, power: 90, type: 机械, category: 变化, desc: 本系大威力输出，有概率提升物攻}
      - {name: 羽化加速, type: 翼, category: 变化, desc: 高威力搏命技能，命中不满但收益高}
      - {name: 减压阀, type: 机械, category: 变化, desc: 技能石，先制+1收割残局}
      - {name: 光之矛, type: 光, category: 物理, desc: 强化速度，弥补低速短板}
    item: 
    ability: 合拍
    nature: 平和(+生命 -魔攻)
    evs: {hp: 10, attack: 10, defense: 10}
    bloodline: 翼
    setDetails: |
      舍弃续航能力用耐久换取发育窗口。羽化加速可以更快速地叠加特性，且更难被预测, 
      可以通过主动切换抓取对方聚能窗口期来叠加特性, 羽化两次后的光之矛威力不输齿轮扭矩，
      对操作要求较高，更适合在需要连续进攻的场合登场。

counters:
  - jingling: 炫光迪迪
    id: 369
    type: 优势对位
    analysis: |
      炫光迪迪的特攻端输出可以绕过巨鼓象的高物防。电+光的打击面
      能有效压制机械系，而且104速度线先手无压力。需要注意巨鼓象
      如果带了「见招拆招」或先制技能，残血迪迪可能会被收掉。

  - jingling: 水王
    id: 245
    type: 优势对位
    analysis: |
      水王的高特攻和本系水系技能可以轻松压制巨鼓象的特防短板。
      但要注意水王自身的物理耐久一般，如果被巨鼓象的「齿轮扭矩」
      打到会很痛，需要合理轮转。

  - jingling: 火系特攻手
    id: null
    type: 优势对位
    analysis: |
      火系技能对机械系效果拔群，任何高速火系特攻手都可以作为
      巨鼓象的check。但要注意火系精灵自身的物理耐久通常不高，
      不要给巨鼓象免费上场的机会。

  - jingling: 物攻手（非地/火）
    id: null
    type: 劣势对位
    analysis: |
      绝大部分物理攻击手都无法突破巨鼓象的物防，尤其是「合拍」
      触发后更是不可能。不要试图用物攻手和巨鼓象正面对攻，
      除非你确信能一击必杀。

teamOptions:
  - 搭配特防向的队友（如圣光迪莫、幻灵等）弥补特耐短板
  - 地面系或火系队友可以压制威胁巨鼓象的火系特攻手
  - 钉子/场地辅助手可以帮助巨鼓象更好地压制对方轮转
  - 巨鼓象适合出现在平衡队或受队中，作为物理端的中转核心

moves:
  recommended:
    - 齿轮扭矩（本系稳定输出）
    - 排气（回复+解状态）
    - 杠杆置换（补盲）
    - 能量守恒（强化）
    - 齿轮切开（大威力）
    - 械斗（高威力搏命）
    - 主轴（提速）
  other_options: 锐利眼神（清除对方强化）、轴承支撑（拉高HP上限）、减压阀（清自身负面）
  skill_stones: 见招拆招（先制收割）、主场优势（上场强化）、防反（反制物攻手）
  bloodline: 休息回复（额外回复）、金属噪音（降特防配合队友）
