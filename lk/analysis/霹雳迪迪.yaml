id: 369
formes: 1
name: 霹雳迪迪
tier: OU

overview: |
  功能测试中, 内容为AI胡编乱造, 炫光迪迪是高速特攻手的代表，139特攻+130速度配上电+光的优秀打击面，
  让它在中速环境中有着极强的压制力。特性「安可」让它在使用光系技能后
  能安全返场，操作空间很大。缺点是物防只有65点，非常怕草系物攻手。

sets:
  - name: 双攻炮台
    type: 攻击
    moves:
      - {name: 放晴, type: 光, category: 变化, desc: 本系高威力电系输出}
      - {name: 色散, type: 光, category: 魔法, desc: 本系光系输出，触发安可特性返场}
      - {name: 落雷, type: 电, category: 魔法, desc: 连续攻击，有机会突破气腰}
      - {name: 电磁偏转, type: 电, category: 防御, desc: 电系补盲，配合电磁偏转或队友的麻痹}
    ability: 安可
    nature: 胆小(+速度 -物攻)
    evs: {hp: 10, sp_atk: 10, speed: 10}
    bloodline: 火
    setDetails: |
      经典的极速高攻配置。利用速度线压制中速精灵，色散后触发安可
      安全返场形成循环压迫。要注意物防端非常脆弱，任何本系克制物攻
      都能轻易击杀。

  - name: 干扰辅助
    type: 辅助
    moves:
      - {name: 电磁偏转, type: 电, category: 变化, desc: 弹反对方的变化技能，干扰对手节奏}
      - {name: 色散, type: 光, category: 特殊, desc: 本系输出+安可触发返场}
      - {name: 耀眼, type: 光, category: 变化, desc: 技能石，降低对方命中率}
      - {name: 加大功率, type: 电, category: 变化, desc: 强化特攻等级}
    item: 剩饭
    ability: 安可
    nature: 胆小(+速度 -物攻)
    evs: {hp: 252, sp_atk: 4, speed: 252}
    setDetails: |
      利用电磁偏转和耀眼的干扰组合打乱对手节奏，色散返场保证安全。
      适合在平衡队中担任节奏控制者。

counters:
  - pokemon: 巨鼓象
    id: 372
    type: 劣势对位
    analysis: |
      巨鼓象的特防虽然不够看，但炫光迪迪本身特攻种族只有111，
      没有强化的情况下很难突破。而且巨鼓象的「齿轮扭矩」可以确一
      炫光迪迪。不要试图和巨鼓象正面对攻。

  - pokemon: 高速先制物攻手
    id: null
    type: 劣势对位
    analysis: |
      炫光迪迪52点物防极度脆弱，任何本系先制物攻技能都可以轻易击杀。
      遇到有先制技能的对手时需要非常谨慎，尽量通过队友创造安全上场机会。

  - pokemon: 地面系盾牌
    id: null
    type: 均势对位
    analysis: |
      地面系抵抗电系技能，但光系技能依然能造成伤害。需要根据具体精灵
      判断，如果对方特防较高则炫光迪迪较难突破。

  - pokemon: 低速特防盾
    id: null
    type: 优势对位
    analysis: |
      炫光迪迪可以高速压制各种低速特防一般的盾牌，利用色散-安可-返场
      的循环不断消耗，让对手难以有效反击。

teamOptions:
  - 搭配钉子和撒钉手，压制对手的轮转
  - 物防向的队友（如巨鼓象）可以弥补物理端的脆弱
  - 地面系队友可以吸收电系技能，形成联防
  - 高速队中作为特攻输出核心，配合先制手收割残局

moves:
  recommended:
    - 电离爆破（本系电系）
    - 色散（本系光系+安可触发）
    - 双联脉冲（破气腰）
    - 落雷（补盲）
    - 电磁偏转（干扰）
  other_options: 光球（稳定光系输出）、电流（先制电系）、超导（降特防）
  skill_stones: 耀眼（降低命中）、加大功率（强化输出）、主场优势（登场强化）
  bloodline: 虹光冲击（大威力光系）、球状闪电（大威力电系）、升龙咆哮（龙系补盲）
